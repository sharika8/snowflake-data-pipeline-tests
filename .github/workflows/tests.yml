name: Snowflake & Pipeline Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      run_snowflake:
        description: Run Snowflake integration tests
        type: boolean
        default: false

jobs:
  unit-tests:
    name: Unit & DQ Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install pandas pytest pytest-html faker tenacity pydantic python-dotenv requests pyarrow
      - name: Create reports dir
        run: mkdir -p reports
      - name: Run unit tests (no Snowflake needed)
        run: |
          pytest tests/data_quality/ tests/pipeline/ tests/fixtures/ tests/snowflake/test_schema_validation.py \
            -v --tb=short \
            --html=reports/unit-test-report.html \
            --junit-xml=reports/unit-results.xml \
            -x
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-report
          path: reports/
          retention-days: 30

  integration-tests:
    name: Integration Tests (mock pipeline)
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install pandas pytest pytest-html faker tenacity pydantic python-dotenv requests pyarrow
      - run: mkdir -p reports
      - name: Run integration tests (no Snowflake)
        run: |
          pytest tests/integration/ -v --tb=short \
            --html=reports/integration-report.html \
            --junit-xml=reports/integration-results.xml
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-report
          path: reports/
          retention-days: 30

  snowflake-tests:
    name: Snowflake Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    if: vars.SNOWFLAKE_ACCOUNT != '' || github.event.inputs.run_snowflake == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install snowflake-connector-python pandas pytest pytest-html faker tenacity pydantic python-dotenv requests pyarrow
      - run: mkdir -p reports
      - name: Run Snowflake tests
        env:
          SNOWFLAKE_ACCOUNT:   ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER:      ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD:  ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_DATABASE:  ${{ secrets.SNOWFLAKE_DATABASE }}
          SNOWFLAKE_SCHEMA:    ${{ secrets.SNOWFLAKE_SCHEMA }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
        run: |
          pytest tests/snowflake/ tests/integration/ -v --tb=short \
            --html=reports/snowflake-report.html \
            --junit-xml=reports/snowflake-results.xml
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: snowflake-test-report
          path: reports/
          retention-days: 30

  all-passed:
    name: All Tests Passed
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    if: always()
    steps:
      - name: Check results
        run: |
          for r in "${{ needs.unit-tests.result }}" "${{ needs.integration-tests.result }}"; do
            if [[ "$r" != "success" && "$r" != "skipped" ]]; then
              echo "Failed: $r"; exit 1
            fi
          done
          echo "All tests passed"
