[pytest]
minversion = 8.0
opts = -v --tb=short -p no/cacheprovider

testpaths = tests
addopts =
    -v
    --tb=short
    --strict-markers
    -p no/cacheprovider

markers =
    unit:              Fast unit tests -- no external services needed
    integration:       Integration tests -- may need Snowflake or Airflow
    snowflake:         Tests requiring a live Snowflake connection
    airflow:           Tests requiring a running Airflow instance
    pipeline:          Pipeline reconciliation and ETL tests
    data_quality:      Data quality validation tests
    slow:              Tests that take > 30 seconds

filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
